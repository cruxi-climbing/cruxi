name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:18-master
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: cruxi
        ports:
          - 5432:5432
        options: >
          --health-cmd "pg_isready -U admin -d cruxi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://admin:admin@localhost:5432/cruxi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          version: stable

      - name: Install dependencies
        run: bun install

      - name: Run verify
        run: bun verify

      - name: Run tests
        run: bun test
